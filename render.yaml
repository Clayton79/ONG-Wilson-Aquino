services:
  - type: web
    name: ong-wilson-aquino-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    nodeVersion: "20"
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "https://clayton79.github.io"
